name: CI

on:
  push:
    branches: [main, develop, ts_v1]
  pull_request:
    branches: [main, develop, ts_v1]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify SKILL.md hash manifest
        run: npm run check:skill-hash

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm pack --dry-run
